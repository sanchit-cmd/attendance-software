{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}
Login
{% endblock %}

{% block content %}
<div class="login-container">
  <h2>Student Login</h2>
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Login</button>
  </form>
  <p class="mt-3">
    <small>Use your phone number and password to login</small>
  </p>
</div>
{% endblock %}
