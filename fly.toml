# fly.toml app configuration file generated for attendance-software on 2026-05-28T23:28:58+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'attendance-software'
primary_region = 'bom'
console_command = '/code/.venv/bin/python manage.py shell'

[build]

[deploy]
  release_command = '/code/.venv/bin/python manage.py migrate --noinput'

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[statics]]
  guest_path = '/code/backend/staticfiles'
  url_prefix = '/static/'
